<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthdays This Month</title>
<link href="https://fonts.googleapis.com/css2?family=Mona+Sans:wght@400;600;800;900&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root { --u: 1vmin; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; }
  body {
    background:#0d0d1a; color:#fff; font-family:'Mona Sans',sans-serif;
    min-height:100vh; display:flex; flex-direction:column;
    padding:calc(var(--u)*3) calc(var(--u)*5) calc(var(--u)*2); position:relative;
  }
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .star{position:absolute;border-radius:50%;background:#fff;animation:twinkle ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:.1;transform:scale(1);}50%{opacity:.8;transform:scale(1.4);}}
  .confetti-piece{position:fixed;top:-30px;pointer-events:none;z-index:1;opacity:.9;animation:confettiFall linear infinite;}
  @keyframes confettiFall{0%{transform:translateY(-30px) rotate(0deg) scaleX(1);}50%{transform:translateY(55vh) rotate(360deg) scaleX(-1);}100%{transform:translateY(115vh) rotate(720deg) scaleX(1);}}
  header{position:relative;z-index:3;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;margin-bottom:calc(var(--u)*2);animation:fadeDown .7s ease-out both;}
  @keyframes fadeDown{from{opacity:0;transform:translateY(calc(var(--u)*-3));}to{opacity:1;transform:translateY(0);}}
  .header-left{display:flex;flex-direction:column;gap:calc(var(--u)*.4);}
  .eyebrow{font-size:calc(var(--u)*1.3);font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:#ffd93d;display:flex;align-items:center;gap:calc(var(--u)*.8);}
  .eyebrow-dot{width:calc(var(--u)*.8);height:calc(var(--u)*.8);border-radius:50%;background:#ffd93d;box-shadow:0 0 calc(var(--u)*1.2) #ffd93d;animation:dotPulse 2s ease-in-out infinite;}
  @keyframes dotPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.5);}}
  .big-title{line-height:.92;}
  .month-name{font-size:calc(var(--u)*7.5);font-weight:900;letter-spacing:-.02em;display:block;background:linear-gradient(90deg,#fff 0%,#ff6ec7 55%,#ffd93d 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .word-birthdays{font-family:'Caveat',cursive;font-size:calc(var(--u)*5.5);font-weight:700;display:block;margin-top:calc(var(--u)*-.3);background:linear-gradient(90deg,#6bffb8,#05c3de);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:calc(var(--u)*1);}
  .year-badge{font-size:calc(var(--u)*1.5);font-weight:800;letter-spacing:.2em;padding:calc(var(--u)*.7) calc(var(--u)*2);border-radius:999px;border:2px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);}
  .count-badge{font-size:calc(var(--u)*1.6);font-weight:700;padding:calc(var(--u)*1) calc(var(--u)*2.5);border-radius:999px;background:linear-gradient(135deg,#ff6ec7,#ff8e6b);box-shadow:0 0 calc(var(--u)*3) rgba(255,110,199,.5);white-space:nowrap;}
  main{flex:1;min-height:0;position:relative;z-index:2;display:flex;align-items:center;justify-content:center;}
  .banner-grid{display:grid;grid-template-columns:repeat(var(--cols,4),var(--col-size,19vmin));gap:calc(var(--u)*2);justify-content:center;align-content:center;}
  .banner{position:relative;border-radius:calc(var(--u)*1.2);padding:calc(var(--u)*1.8) calc(var(--u)*1.5) calc(var(--u)*2.8);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:calc(var(--u)*.5);overflow:visible;opacity:0;animation:bannerPop .5s cubic-bezier(.34,1.56,.64,1) forwards;clip-path:polygon(0 0,100% 0,100% calc(100% - 2.5vmin),50% 100%,0 calc(100% - 2.5vmin));}
  @keyframes bannerPop{from{opacity:0;transform:scale(.72) translateY(3vmin) rotate(-5deg);}to{opacity:1;transform:scale(1) translateY(0) rotate(0deg);}}
  .banner-string{position:absolute;top:calc(var(--u)*-4);left:50%;transform:translateX(-50%);width:1.5px;height:calc(var(--u)*4);background:linear-gradient(to bottom,rgba(255,255,255,.08),rgba(255,255,255,.35));}
  .banner-emoji{font-size:calc(var(--u)*3.2);line-height:1;filter:drop-shadow(0 calc(var(--u)*.4) calc(var(--u)*1) rgba(0,0,0,.35));animation:emojiWobble 3s ease-in-out infinite;}
  @keyframes emojiWobble{0%,100%{transform:rotate(-8deg);}50%{transform:rotate(8deg);}}
  .banner-name{font-family:'Mona Sans',sans-serif;font-weight:900;font-size:var(--name-fs,2.8vmin);color:#fff;text-align:center;line-height:1.05;text-shadow:0 calc(var(--u)*.4) calc(var(--u)*1.5) rgba(0,0,0,.45);word-break:break-word;max-width:100%;margin-bottom:calc(var(--u)*.3);}
  .banner-date{font-size:calc(var(--u)*1.3);font-weight:600;letter-spacing:.07em;color:rgba(255,255,255,.8);}
  .banner-bureau{font-size:calc(var(--u)*.95);font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.55);}
  .banner.past{filter:grayscale(.45) brightness(.55);}
  .banner.today{animation:bannerPop .5s cubic-bezier(.34,1.56,.64,1) forwards,todayGlow 2.5s ease-in-out infinite .6s;z-index:5;}
  @keyframes todayGlow{0%,100%{filter:brightness(1) drop-shadow(0 0 2vmin rgba(255,217,61,.6));}50%{filter:brightness(1.12) drop-shadow(0 0 4vmin rgba(255,217,61,.9));}}
  .today-crown{position:absolute;top:calc(var(--u)*-4.5);left:50%;transform:translateX(-50%);font-size:calc(var(--u)*3.5);animation:crownBob 1.6s ease-in-out infinite;filter:drop-shadow(0 0 calc(var(--u)*1.5) gold);z-index:4;}
  @keyframes crownBob{0%,100%{transform:translateX(-50%) translateY(0) rotate(-6deg);}50%{transform:translateX(-50%) translateY(-1vmin) rotate(6deg);}}
  .today-label{position:absolute;top:calc(var(--u)*.5);right:calc(var(--u)*.5);background:linear-gradient(135deg,#ffd93d,#ff8e6b);color:#1a1a1a;font-size:calc(var(--u)*1);font-weight:900;letter-spacing:.18em;padding:calc(var(--u)*.4) calc(var(--u)*.9);border-radius:calc(var(--u)*.4);z-index:4;}
  .state-msg{font-family:'Caveat',cursive;font-size:calc(var(--u)*3.5);color:rgba(255,255,255,.7);text-align:center;}
  .lights-bar{position:relative;z-index:3;flex-shrink:0;display:flex;justify-content:center;align-items:flex-start;gap:calc(var(--u)*2.5);padding-top:calc(var(--u)*3);}
  .wire-line{position:absolute;top:calc(var(--u)*3 + .75px);left:calc(var(--u)*3);right:calc(var(--u)*3);height:1.5px;background:rgba(255,255,255,.18);z-index:-1;}
  .bulb-wrap{display:flex;flex-direction:column;align-items:center;}
  .bulb-wire{width:1.5px;height:calc(var(--u)*1.5);background:rgba(255,255,255,.22);}
  .bulb{width:calc(var(--u)*1.6);height:calc(var(--u)*2.2);border-radius:50% 50% 45% 45%;animation:bulbGlow 2s ease-in-out infinite;}
  @keyframes bulbGlow{0%,100%{filter:brightness(.7);}50%{filter:brightness(1.5) saturate(1.4);}}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<header>
  <div class="header-left">
    <div class="eyebrow"><span class="eyebrow-dot"></span>Let's Celebrate</div>
    <div class="big-title">
      <span class="month-name" id="month-label">May</span>
      <span class="word-birthdays">Birthdays!</span>
    </div>
  </div>
  <div class="header-right">
    <div class="year-badge" id="year-label">2026</div>
    <div class="count-badge">🎉 <span id="count-text">— this month</span></div>
  </div>
</header>
<main id="main"><div class="state-msg">Loading birthdays… 🎈</div></main>
<div class="lights-bar" id="lights-bar"><div class="wire-line"></div></div>
<script>
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSNYPnsghleG2vyJgNbePYiiXruEAy1m7d3Wco_UQiUpiVgPZgKxbDCOTjDjrrrw3D_HEQl8yd7Dxkh/pub?output=csv";
  const REFRESH_HOURS = 6;
  const PALETTES = [
    {bg:['#ff6ec7','#d93898']},{bg:['#ffd93d','#e6a800']},{bg:['#6bffb8','#00c46e']},
    {bg:['#ff8e6b','#e05020']},{bg:['#b892ff','#7c3aed']},{bg:['#05c3de','#007fa3']},
    {bg:['#ff5f5f','#cc1100']},{bg:['#7dff6b','#3db52e']},
  ];
  const EMOJIS=['🎂','🎁','🎈','🎊','🥳','🧁','🍰','⭐','✨','🎀','🪅','🎆','🎇','🥂'];
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const MONTHS_ABBR=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const CONFETTI_COLORS=['#ff6ec7','#ffd93d','#6bffb8','#ff8e6b','#b892ff','#05c3de','#ff5f5f','#7dff6b'];
  const BULB_COLORS=['#ff6ec7','#ffd93d','#6bffb8','#ff8e6b','#b892ff','#05c3de'];
  let lastLoaded=null;
  function makeStars(){const c=document.getElementById('stars');for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';const sz=1+Math.random()*2.5;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s;`;c.appendChild(s);}}
  function makeConfetti(n=55){for(let i=0;i<n;i++){const el=document.createElement('div');el.className='confetti-piece';const col=CONFETTI_COLORS[i%CONFETTI_COLORS.length];const w=6+Math.random()*8,h=Math.random()>.5?w:w*2;el.style.cssText=`left:${Math.random()*100}vw;width:${w}px;height:${h}px;background:${col};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${7+Math.random()*8}s;animation-delay:${Math.random()*14}s;`;document.body.appendChild(el);}}
  function lighten(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);const m=v=>Math.min(255,Math.round(v+(255-v)*.55));return `rgb(${m(r)},${m(g)},${m(b)})`;}
  function makeLights(n=20){const bar=document.getElementById('lights-bar');for(let i=0;i<n;i++){const col=BULB_COLORS[i%BULB_COLORS.length];const wrap=document.createElement('div');wrap.className='bulb-wrap';const wire=document.createElement('div');wire.className='bulb-wire';const bulb=document.createElement('div');bulb.className='bulb';bulb.style.cssText=`background:radial-gradient(circle at 35% 30%,${lighten(col)},${col});box-shadow:0 0 8px ${col},0 0 18px ${col}55;animation-delay:${i*.18}s;`;wrap.appendChild(wire);wrap.appendChild(bulb);bar.appendChild(wrap);}}
  function parseCSV(text){const rows=[];let row=[],field='',inQ=false;for(let i=0;i<text.length;i++){const c=text[i];if(inQ){if(c==='"'&&text[i+1]==='"'){field+='"';i++;}else if(c==='"'){inQ=false;}else{field+=c;}}else{if(c==='"'){inQ=true;}else if(c===','){row.push(field);field='';}else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';}else if(c==='\r'){}else{field+=c;}}}if(field.length||row.length){row.push(field);rows.push(row);}return rows.filter(r=>r.some(c=>c.trim()!==''));}
  function parseMonth(v){v=String(v).trim();const n=parseInt(v,10);if(!isNaN(n)&&n>=1&&n<=12)return n;const lo=v.toLowerCase();for(let i=0;i<MONTHS.length;i++)if(MONTHS[i].toLowerCase().startsWith(lo.slice(0,3)))return i+1;return null;}
  function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function ordinal(n){const s=['th','st','nd','rd'],v=n%100;return s[(v-20)%10]||s[v]||s[0];}
  function getGridConfig(n){
    if(n<=2)return{cols:2,colSize:30,nameFs:4.2};
    if(n<=3)return{cols:3,colSize:24,nameFs:3.8};
    if(n<=4)return{cols:4,colSize:19,nameFs:3.4};
    if(n<=6)return{cols:3,colSize:24,nameFs:3.4};
    if(n<=8)return{cols:4,colSize:19,nameFs:3.0};
    if(n<=9)return{cols:3,colSize:24,nameFs:2.8};
    if(n<=10)return{cols:5,colSize:15,nameFs:2.6};
    if(n<=12)return{cols:4,colSize:19,nameFs:2.6};
    if(n<=15)return{cols:5,colSize:15,nameFs:2.3};
    if(n<=18)return{cols:6,colSize:13,nameFs:2.1};
    if(n<=20)return{cols:5,colSize:15,nameFs:2.0};
    if(n<=24)return{cols:6,colSize:13,nameFs:1.9};
    if(n<=28)return{cols:7,colSize:11,nameFs:1.7};
    return{cols:7,colSize:11,nameFs:1.5};
  }
  function renderBirthdays(entries,currentMonth,currentDay){
    const countEl=document.getElementById('count-text');
    if(entries.length===0){countEl.textContent='0 birthdays this month';document.getElementById('main').innerHTML=`<div class="state-msg">No birthdays this month ✨<br>but the party never stops! 🎈</div>`;return;}
    countEl.textContent=entries.length===1?'1 birthday this month':`${entries.length} birthdays this month`;
    const{cols,colSize,nameFs}=getGridConfig(entries.length);
    const root=document.documentElement;
    root.style.setProperty('--cols',cols);
    root.style.setProperty('--col-size',`${colSize}vmin`);
    root.style.setProperty('--name-fs',`${nameFs}vmin`);
    const minH=(colSize*.85).toFixed(2);
    let html='<div class="banner-grid">';
    entries.forEach((e,i)=>{
      const isToday=e.day===currentDay,past=e.day<currentDay;
      const pal=PALETTES[i%PALETTES.length],emoji=EMOJIS[i%EMOJIS.length];
      const abbr=MONTHS_ABBR[currentMonth-1];
      const classes=['banner',isToday?'today':(past?'past':'')].filter(Boolean).join(' ');
      html+=`<div class="${classes}" style="background:linear-gradient(145deg,${pal.bg[0]},${pal.bg[1]});min-height:${minH}vmin;animation-delay:${(.04+i*.07).toFixed(2)}s;">`;
      if(isToday)html+=`<span class="today-crown">👑</span><span class="today-label">TODAY!</span>`;
      html+=`<span class="banner-string"></span><span class="banner-emoji">${isToday?'🎂':emoji}</span><span class="banner-name">${esc(e.name)}</span><span class="banner-date">${abbr} ${e.day}${ordinal(e.day)}</span>`;
      if(e.bureau)html+=`<span class="banner-bureau">${esc(e.bureau)}</span>`;
      html+=`</div>`;
    });
    html+='</div>';
    document.getElementById('main').innerHTML=html;
  }
  function renderError(msg){document.getElementById('main').innerHTML=`<div class="state-msg">${msg}</div>`;document.getElementById('count-text').textContent='— celebrating this month';}
  async function loadBirthdays(){
    const today=new Date();
    const cm=today.getMonth()+1,cd=today.getDate(),cy=today.getFullYear();
    document.getElementById('month-label').textContent=MONTHS[cm-1];
    document.getElementById('year-label').textContent=cy;
    try{
      let text;
      try{const r=await fetch(SHEET_CSV_URL,{cache:'no-store'});if(!r.ok)throw new Error(r.status);text=await r.text();}
      catch{const r=await fetch('https://corsproxy.io/?'+encodeURIComponent(SHEET_CSV_URL),{cache:'no-store'});if(!r.ok)throw new Error(r.status);text=await r.text();}
      const rows=parseCSV(text);if(rows.length<2)throw new Error('No data');
      const hdr=rows[0].map(h=>h.trim().toLowerCase());
      const ni=hdr.findIndex(h=>h.includes('name')),mi=hdr.findIndex(h=>h.includes('month')),di=hdr.findIndex(h=>h.includes('day')),bi=hdr.findIndex(h=>h.includes('bureau'));
      if(ni<0||mi<0||di<0)throw new Error('Missing columns');
      const entries=[];
      for(let i=1;i<rows.length;i++){const r=rows[i];const name=(r[ni]||'').trim(),month=parseMonth(r[mi]),day=parseInt((r[di]||'').trim(),10),bureau=bi>=0?String(r[bi]||'').trim().toUpperCase():'';if(!name||!month||isNaN(day)||day<1||day>31)continue;if(month===cm)entries.push({name,month,day,bureau});}
      entries.sort((a,b)=>a.day-b.day);
      lastLoaded={entries,currentMonth:cm,currentDay:cd};
      renderBirthdays(entries,cm,cd);
    }catch(err){console.error(err);renderError("Couldn't load birthdays 🎈<br><span style='font-size:.55em;opacity:.7'>Check the Google Sheet is published as CSV</span>");}
  }
  makeStars();makeConfetti();makeLights();loadBirthdays();
  setInterval(loadBirthdays,REFRESH_HOURS*60*60*1000);
  let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{if(lastLoaded)renderBirthdays(lastLoaded.entries,lastLoaded.currentMonth,lastLoaded.currentDay);},200);});
  (function(){const now=new Date();setTimeout(()=>location.reload(),new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,0,30)-now);})();
</script>
</body>
</html>
